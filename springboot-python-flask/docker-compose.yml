version: '3.8'

services:
  mysql:
    image: mysql:8.0
    container_name: skillgap-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: ${MYSQL_ROOT_PASSWORD:-rootpassword}
      MYSQL_DATABASE: skill_gap_db
    ports:
      - "3307:3306"
    volumes:
      - mysql_data:/var/lib/mysql
      - ./schema.sql:/docker-entrypoint-initdb.d/schema.sql
    networks:
      - skillgap-network

  ml-service:
    build:
      context: ./ml-service
      dockerfile: Dockerfile
    container_name: skillgap-ml-service
    restart: always
    environment:
      - GEMINI_API_KEY=${GEMINI_API_KEY}
    ports:
      - "5001:5001"
    volumes:
      - chroma_data:/app/chroma_db
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:5001/internal/analyze"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - skillgap-network

  spring-backend:
    build:
      context: ./spring-backend
      dockerfile: Dockerfile
    container_name: skillgap-spring-backend
    restart: always
    ports:
      - "8081:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/skill_gap_db?useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=${MYSQL_ROOT_PASSWORD:-rootpassword}
      - JWT_SECRET=${JWT_SECRET:-fallback-secret-key-123456}
      - ML_SERVICE_URL=http://ml-service:5001
    depends_on:
      - mysql
      - ml-service
    networks:
      - skillgap-network

  react-frontend:
    build:
      context: ..
      dockerfile: ./springboot-python-flask/react-frontend/Dockerfile
    container_name: skillgap-react-frontend
    restart: always
    ports:
      - "5174:80"
    depends_on:
      - spring-backend
    networks:
      - skillgap-network

  nginx:
    image: nginx:alpine
    container_name: skillgap-nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx.conf:/etc/nginx/nginx.conf:ro
    depends_on:
      - react-frontend
      - spring-backend
    networks:
      - skillgap-network

networks:
  skillgap-network:
    driver: bridge

volumes:
  mysql_data:
  chroma_data:
